version: "3.9"

services:
  # VirtualBench Cloud API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=virtualbench
      - DB_PASSWORD=virtualbench
      - DB_NAME=virtualbench
      - JWT_SECRET=change-this-to-a-secure-random-secret-in-production
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vbcloud

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: virtualbench
      POSTGRES_PASSWORD: virtualbench
      POSTGRES_DB: virtualbench
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtualbench"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vbcloud

  # Redis 7 (for production rate limiting & caching)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vbcloud

volumes:
  pgdata:
  redisdata:

networks:
  vbcloud:
    driver: bridge
